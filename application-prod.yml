server:
  port: ${SERVER_PORT:5000}

spring:
  application:
    name: research-workbench
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/research_workbench}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:192969}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  web:
    resources:
      static-locations: classpath:/static/
  servlet:
    multipart:
      enabled: true
      max-file-size: 900MB
      max-request-size: 900MB
      file-size-threshold: 2KB
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: 5000ms
      repositories:
        enabled: false
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  file:
    upload-dir: ${UPLOAD_DIR}
  external:
    allow-fallback: true
  oauth:
    redirect-base-url: ${OAUTH_REDIRECT_BASE_URL:http://localhost:5000}
    wechat:
      enabled: ${WECHAT_OAUTH_ENABLED:false}
      client-id: ${WECHAT_APP_ID:}
      client-secret: ${WECHAT_APP_SECRET:}
      authorize-url: ${WECHAT_AUTHORIZE_URL:https://open.weixin.qq.com/connect/qrconnect}
      token-url: ${WECHAT_TOKEN_URL:https://api.weixin.qq.com/sns/oauth2/access_token}
      user-info-url: ${WECHAT_USERINFO_URL:https://api.weixin.qq.com/sns/userinfo}
      scope: ${WECHAT_SCOPE:snsapi_login}
    feishu:
      enabled: ${FEISHU_OAUTH_ENABLED:false}
      client-id: ${FEISHU_APP_ID:}
      client-secret: ${FEISHU_APP_SECRET:}
      authorize-url: ${FEISHU_AUTHORIZE_URL:https://accounts.feishu.cn/open-apis/authen/v1/authorize}
      token-url: ${FEISHU_TOKEN_URL:https://open.feishu.cn/open-apis/authen/v1/access_token}
      user-info-url: ${FEISHU_USERINFO_URL:https://open.feishu.cn/open-apis/authen/v1/user_info}
      scope: ${FEISHU_SCOPE:contact:user.base:readonly}
  ai-assistant:
    enabled: true
    llm-provider: ${LLM_PROVIDER:alibaba}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      temperature: 0.35
      max-tokens: 2048
    alibaba:
      api-key: ${ALIBABA_API_KEY:}
      base-url: ${ALIBABA_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model: ${ALIBABA_MODEL:qwen-plus}
      temperature: 0.35
      max-tokens: 2048
    metaso:
      enabled: true
      api-key: ${METASO_API_KEY:}
      base-url: ${METASO_BASE_URL:https://metaso.cn/api/v1}
      search-path: /search
      scope: webpage
      result-size: 8
      concise: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 86400000
  refresh-token-expiration: 2592000000

logging:
  level:
    root: INFO
    com.research: INFO
    org.springframework.security: INFO
  file:
    name: logs/research-workbench.log
